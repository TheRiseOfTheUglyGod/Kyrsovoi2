# =============================================
# PRODUCTS
# =============================================
products.findById=SELECT * FROM products WHERE product_id = ?
products.findAll=SELECT * FROM products
products.search=SELECT * FROM products WHERE name ILIKE ? OR article ILIKE ?
products.create=INSERT INTO products (name, article, unit, description, photo_path, min_stock) VALUES (?, ?, ?, ?, ?, ?)
products.update=UPDATE products SET name=?, article=?, unit=?, description=?, photo_path=?, min_stock=?, updated_at=CURRENT_TIMESTAMP WHERE product_id=?
products.delete=DELETE FROM products WHERE product_id=?

# =============================================
# SUPPLIERS
# =============================================
suppliers.findById=SELECT * FROM suppliers WHERE supplier_id = ?
suppliers.findAll=SELECT * FROM suppliers
suppliers.create=INSERT INTO suppliers (name, contact_person, phone, email, address) VALUES (?,?,?,?,?)
suppliers.update=UPDATE suppliers SET name=?, contact_person=?, phone=?, email=?, address=?, updated_at=CURRENT_TIMESTAMP WHERE supplier_id=?
suppliers.delete=DELETE FROM suppliers WHERE supplier_id=?

# =============================================
# STORAGE CELLS
# =============================================
cells.findById=SELECT * FROM storage_cells WHERE cell_id = ?
cells.findAll=SELECT * FROM storage_cells
cells.create=INSERT INTO storage_cells (zone, row_num, rack, cell_number) VALUES (?,?,?,?)
cells.update=UPDATE storage_cells SET zone=?, row_num=?, rack=?, cell_number=?, updated_at=CURRENT_TIMESTAMP WHERE cell_id=?
cells.delete=DELETE FROM storage_cells WHERE cell_id=?

# =============================================
# STOCKS (?????? ???????, ??? ???????? ????????)
# =============================================
stocks.getQuantity=SELECT quantity FROM stocks WHERE product_id = ? AND cell_id = ?
stocks.increase=INSERT INTO stocks (product_id, cell_id, quantity) VALUES (?, ?, ?) ON CONFLICT (product_id, cell_id) DO UPDATE SET quantity = stocks.quantity + EXCLUDED.quantity, updated_at = CURRENT_TIMESTAMP
stocks.decreaseCheck=SELECT quantity FROM stocks WHERE product_id = ? AND cell_id = ?
stocks.decreaseUpdate=UPDATE stocks SET quantity = quantity - ?, updated_at = CURRENT_TIMESTAMP WHERE product_id = ? AND cell_id = ?
stocks.setQuantity=UPDATE stocks SET quantity = ?, updated_at = CURRENT_TIMESTAMP WHERE product_id = ? AND cell_id = ?
stocks.findByProduct=SELECT * FROM stocks WHERE product_id = ?

# =============================================
# RECEIPTS
# =============================================
receipts.insert=INSERT INTO receipts (receipt_date, supplier_id) VALUES (?, ?)
receipts.insertItem=INSERT INTO receipt_items (receipt_id, product_id, quantity, purchase_price, cell_id) VALUES (?, ?, ?, ?, ?)
receipts.findById=SELECT * FROM receipts WHERE receipt_id = ?
receipts.findAll=SELECT * FROM receipts

# =============================================
# SHIPMENTS
# =============================================
shipments.insert=INSERT INTO shipments (shipment_date, customer) VALUES (?, ?)
shipments.insertItem=INSERT INTO shipment_items (shipment_id, product_id, quantity, cell_id) VALUES (?, ?, ?, ?)
shipments.findById=SELECT * FROM shipments WHERE shipment_id = ?
shipments.findAll=SELECT * FROM shipments

# =============================================
# INVENTORIES
# =============================================
inventories.insert=INSERT INTO inventories (inventory_date, status) VALUES (?, 'in_progress')
inventories.insertItem=INSERT INTO inventory_items (inventory_id, product_id, cell_id, book_quantity) VALUES (?, ?, ?, ?)
inventories.getItemIds=SELECT inventory_item_id FROM inventory_items WHERE inventory_id = ? ORDER BY inventory_item_id
inventories.updateActual=UPDATE inventory_items SET actual_quantity = ? WHERE inventory_item_id = ?
inventories.complete=UPDATE inventories SET status = 'completed', updated_at = CURRENT_TIMESTAMP WHERE inventory_id = ?
inventories.findById=SELECT * FROM inventories WHERE inventory_id = ?
inventories.findAll=SELECT * FROM inventories